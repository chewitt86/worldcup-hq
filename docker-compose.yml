services:
  worldcup-hq:
    build: .
    image: worldcup-hq
    container_name: worldcup-hq
    ports:
      - "3050:3050"              # change the LEFT number if 3050 is taken on your server
    volumes:
      - ./server/data:/app/server/data   # shared board + API keys live here — BACK THIS UP
    environment:
      - PORT=3050
      # --- passwords (set these in a git-ignored .env file, not here) ---
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}   # the in-app admin login
      - VIEW_PASSWORD=${VIEW_PASSWORD:-}             # optional: gate the whole site for viewers
    restart: unless-stopped

  # ==========================================================================
  # OPTIONAL — expose the site on your own domain via Cloudflare Tunnel
  # (no router port-forwarding, free HTTPS, no token in this tracked file).
  # To enable, put these in your git-ignored .env:
  #     CLOUDFLARE_TUNNEL_TOKEN=<token from Cloudflare Zero Trust → Tunnels>
  #     COMPOSE_PROFILES=tunnel
  # then `./manage.sh deploy`. In the tunnel's "Public Hostname" tab point your
  # domain at  Service: HTTP  →  URL: worldcup-hq:3050  (same compose network).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
